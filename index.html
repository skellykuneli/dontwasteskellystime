<!DOCTYPE html>

<html>
<head>
<title>don't waste skelly's time</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
}

.container {
    max-width: 700px;
    margin: 0 auto;
    padding: 60px 30px;
}

h1 {
    text-align: center;
    font-weight: normal;
    font-size: 28px;
    margin-bottom: 120px;
}

.rule {
    font-size: 42px;
    margin-bottom: 140px;
    line-height: 1.4;
}

.footer {
    text-align: center;
    opacity: .4;
    margin-top: 100px;
}
</style>

</head>

<body>

<div class="container">

<h1>don't waste skelly's time</h1>

<div class="rule">
1. don't ask me to ask
</div>

<div class="rule">
2. don't make me ask what you need
</div>

<div class="rule">
3. don't just say hello, say what you want
</div>

<div class="rule">
4. include the actual question
</div>

<div class="rule">
5. if you're asking for help, include context
</div>

<div class="footer">
ask the thing.
</div>

</div>

</body>
</html>
